<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Løp 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-100">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const RUNNERS = ['Alexander', 'Didrik', 'Erik', 'Espen'];

        function App() {
            const [events, setEvents] = useState([]);
            const [show, setShow] = useState(false);
            const [form, setForm] = useState({ title: '', date: '', parts: [] });

            useEffect(() => {
                const data = localStorage.getItem('run_v3');
                if (data) setEvents(JSON.parse(data));
            }, []);

            useEffect(() => {
                localStorage.setItem('run_v3', JSON.stringify(events));
                if (window.lucide) lucide.createIcons();
            }, [events, show]);

            const add = (e) => {
                e.preventDefault();
                setEvents([...events, { ...form, id: Date.now() }].sort((a,b) => new Date(a.date) - new Date(b.date)));
                setShow(false);
                setForm({ title: '', date: '', parts: [] });
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white shadow-lg">
                    <div className="bg-slate-900 text-white p-6 flex justify-between items-center">
                        <h1 className="font-black italic uppercase">Løpekalender</h1>
                        <button onClick={() => setShow(true)} className="bg-yellow-400 text-black px-4 py-1 rounded-full font-bold text-xs">+ NY</button>
                    </div>

                    <div className="p-4 space-y-3">
                        {events.map(e => (
                            <div key={e.id} className="border p-4 rounded-xl flex justify-between items-center bg-slate-50">
                                <div>
                                    <p className="text-[10px] font-bold text-slate-400">{e.date}</p>
                                    <h3 className="font-bold uppercase tracking-tight">{e.title}</h3>
                                    <div className="flex gap-1 mt-1">
                                        {e.parts.map(p => <span key={p} className="text-[8px] bg-slate-200 px-1 rounded font-bold">{p}</span>)}
                                    </div>
                                </div>
                                <button onClick={() => setEvents(events.filter(x => x.id !== e.id))} className="text-slate-300">×</button>
                            </div>
                        ))}
                    </div>

                    {show && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4">
                            <div className="bg-white p-6 rounded-2xl w-full space-y-4">
                                <h2 className="font-bold">Ny aktivitet</h2>
                                <input placeholder="Hva?" className="w-full border p-3 rounded-lg" onChange={x => setForm({...form, title: x.target.value})} />
                                <input type="date" className="w-full border p-3 rounded-lg" onChange={x => setForm({...form, date: x.target.value})} />
                                <div className="grid grid-cols-2 gap-2">
                                    {RUNNERS.map(r => (
                                        <button key={r} type="button" onClick={() => setForm({...form, parts: form.parts.includes(r) ? form.parts.filter(p => p !== r) : [...form.parts, r]})} className={`p-2 rounded-lg text-xs border ${form.parts.includes(r) ? 'bg-slate-900 text-white' : 'bg-white'}`}>{r}</button>
                                    ))}
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => setShow(false)} className="flex-1 p-3 bg-slate-100 rounded-xl font-bold">Avbryt</button>
                                    <button onClick={add} className="flex-1 p-3 bg-yellow-400 rounded-xl font-bold text-slate-900">Lagre</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
