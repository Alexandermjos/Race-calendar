<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Løpekalender 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- KONFIGURASJON ---
        const RUNNERS = [
            { name: 'Alexander', color: 'bg-blue-500', text: 'text-blue-700', bg: 'bg-blue-50' },
            { name: 'Didrik', color: 'bg-emerald-500', text: 'text-emerald-700', bg: 'bg-emerald-50' },
            { name: 'Erik', color: 'bg-purple-500', text: 'text-purple-700', bg: 'bg-purple-50' },
            { name: 'Espen', color: 'bg-orange-500', text: 'text-orange-700', bg: 'bg-orange-50' }
        ];

        // MERK: Du må bytte ut disse med dine egne fra Firebase Console for at det skal virke utenfor mitt miljø
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialiser Firebase (Compat mode for enkelthet i index.html)
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        function App() {
            const [events, setEvents] = useState([]);
            const [showModal, setShowModal] = useState(false);
            const [loading, setLoading] = useState(true);
            const [formData, setFormData] = useState({
                title: '', date: '', type: 'Løp', location: '', participants: [], status: 'Forslag'
            });

            // Hent data i sanntid fra Firebase
            useEffect(() => {
                const unsubscribe = db.collection('løp_2026')
                    .orderBy('date', 'asc')
                    .onSnapshot((snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setEvents(data);
                        setLoading(false);
                        if (window.lucide) lucide.createIcons();
                    });
                return () => unsubscribe();
            }, []);

            const saveEvent = async (e) => {
                e.preventDefault();
                await db.collection('løp_2026').add(formData);
                setShowModal(false);
                setFormData({ title: '', date: '', type: 'Løp', location: '', participants: [], status: 'Forslag' });
            };

            const toggleStatus = async (id, current) => {
                const next = current === 'Forslag' ? 'Påmeldt' : 'Forslag';
                await db.collection('løp_2026').doc(id).update({ status: next });
            };

            const deleteEvent = async (id) => {
                if (confirm("Slette denne?")) await db.collection('løp_2026').doc(id).delete();
            };

            return (
                <div className="min-h-screen pb-10">
                    <header className="bg-slate-900 text-white p-6 sticky top-0 z-20 shadow-lg">
                        <div className="max-w-xl mx-auto flex justify-between items-center">
                            <h1 className="text-xl font-black italic uppercase tracking-tight">Løpekalender</h1>
                            <button onClick={() => setShowModal(true)} className="bg-yellow-400 text-slate-900 px-4 py-2 rounded-full font-bold text-xs hover:scale-105 transition-all">
                                + NY AKTIVITET
                            </button>
                        </div>
                    </header>

                    <main className="max-w-xl mx-auto p-4 space-y-4">
                        {loading ? (
                            <p className="text-center py-10 text-slate-400 uppercase font-bold text-xs animate-pulse">Laster fellestreninger...</p>
                        ) : events.map(event => (
                            <div key={event.id} className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm flex">
                                <div className={`w-20 flex flex-col items-center justify-center border-r ${event.status === 'Påmeldt' ? 'bg-emerald-50 text-emerald-600' : 'bg-amber-50 text-amber-600'}`}>
                                    <span className="text-[10px] font-black uppercase">{new Date(event.date).toLocaleDateString('no-NO', { month: 'short' })}</span>
                                    <span className="text-2xl font-black leading-none">{new Date(event.date).getDate()}</span>
                                </div>
                                
                                <div className="flex-1 p-4 space-y-2">
                                    <div className="flex justify-between items-start">
                                        <h3 className="font-black text-slate-900 uppercase italic leading-tight">{event.title}</h3>
                                        <button onClick={() => deleteEvent(event.id)} className="text-slate-200 hover:text-red-500"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                    </div>
                                    
                                    <div className="flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase">
                                        <span>{event.location || 'Oslo'}</span>
                                        <span className={`px-2 py-0.5 rounded ${event.status === 'Påmeldt' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}`}>
                                            {event.status}
                                        </span>
                                    </div>

                                    <div className="flex flex-wrap gap-1 mt-2">
                                        {RUNNERS.map(r => (
                                            <div key={r.name} className={`px-2 py-1 rounded text-[9px] font-black uppercase ${event.participants?.includes(r.name) ? `${r.bg} ${r.text}` : 'bg-slate-50 text-slate-200'}`}>
                                                {r.name}
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <button onClick={() => toggleStatus(event.id, event.status)} className={`w-12 flex items-center justify-center transition-colors ${event.status === 'Påmeldt' ? 'bg-emerald-500 text-white' : 'bg-slate-100 text-slate-300'}`}>
                                    <i data-lucide="check" className="w-6 h-6"></i>
                                </button>
                            </div>
                        ))}
                    </main>

                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/90 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl w-full max-w-md p-6">
                                <h2 className="font-black uppercase italic text-xl mb-6">Ny aktivitet</h2>
                                <form onSubmit={saveEvent} className="space-y-4">
                                    <input required placeholder="Navn på løp..." className="w-full p-4 bg-slate-100 rounded-xl font-bold outline-none" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input required type="date" className="p-4 bg-slate-100 rounded-xl font-bold text-sm" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} />
                                        <select className="p-4 bg-slate-100 rounded-xl font-bold text-sm" value={formData.type} onChange={e => setFormData({...formData, type: e.target.value})}>
                                            <option value="Løp">Løp</option>
                                            <option value="Fellestrening">Trening</option>
                                        </select>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        {RUNNERS.map(r => (
                                            <button key={r.name} type="button" onClick={() => setFormData({...formData, participants: formData.participants.includes(r.name) ? formData.participants.filter(p => p !== r.name) : [...formData.participants, r.name]})} className={`p-3 rounded-xl text-xs font-black border-2 transition-all ${formData.participants.includes(r.name) ? 'border-slate-900 bg-slate-900 text-white' : 'border-slate-100 text-slate-300'}`}>
                                                {r.name}
                                            </button>
                                        ))}
                                    </div>
                                    <div className="flex gap-2 pt-4">
                                        <button type="button" onClick={() => setShowModal(false)} className="flex-1 p-4 bg-slate-100 rounded-2xl font-bold uppercase text-xs">Avbryt</button>
                                        <button type="submit" className="flex-1 p-4 bg-yellow-400 text-slate-900 font-black rounded-2xl uppercase text-xs shadow-lg">Lagre</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Initialiser ikoner etter render
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
