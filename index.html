<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Løpekalender 2026</title>
    
    <!-- Meta-tags for deling (Open Graph) -->
    <meta property="og:title" content="Løpekalender 2026">
    <meta property="og:description" content="Oversikt over løp og fellestreninger for gjengen.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Styling & Ikoner -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        /* Myk animasjon for kortene */
        .event-card { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- KONFIGURASJON ---
        const firebaseConfig = {
            apiKey: "AIzaSyAz9JaUKze476cCA_fC2YsQa3_TUzU7oJM",
            authDomain: "race-calendar-7f8ee.firebaseapp.com",
            projectId: "race-calendar-7f8ee",
            storageBucket: "race-calendar-7f8ee.firebasestorage.app",
            messagingSenderId: "349947217983",
            appId: "1:349947217983:web:45a84d0070e2ff34db908a"
        };

        const RUNNERS = [
            { name: 'Alexander', color: 'bg-blue-500', text: 'text-blue-700', bg: 'bg-blue-50' },
            { name: 'Didrik', color: 'bg-emerald-500', text: 'text-emerald-700', bg: 'bg-emerald-50' },
            { name: 'Erik', color: 'bg-purple-500', text: 'text-purple-700', bg: 'bg-purple-50' },
            { name: 'Espen', color: 'bg-orange-500', text: 'text-orange-700', bg: 'bg-orange-50' }
        ];

        // Initialiser Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        // Ikon-hjelper
        const Icon = ({ name, className }) => {
            useEffect(() => { 
                if (window.lucide) lucide.createIcons(); 
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const [events, setEvents] = useState([]);
            const [showModal, setShowModal] = useState(false);
            const [loading, setLoading] = useState(true);
            const [filter, setFilter] = useState('Alle');
            
            const [form, setForm] = useState({
                title: '', date: '', type: 'Løp', location: '', participants: [], status: 'Forslag'
            });

            useEffect(() => {
                // Forsøk anonym pålogging for å unngå logg-feil
                auth.signInAnonymously().catch(() => {
                    console.log("Bruker uinnlogget tilgang.");
                });

                const unsubscribe = db.collection('events')
                    .onSnapshot((snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        const sorted = data.sort((a, b) => new Date(a.date) - new Date(b.date));
                        setEvents(sorted);
                        setLoading(false);
                    }, (err) => {
                        console.error("Firestore feil:", err);
                        setLoading(false);
                    });

                return () => unsubscribe();
            }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                try {
                    await db.collection('events').add({
                        ...form,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setShowModal(false);
                    setForm({ title: '', date: '', type: 'Løp', location: '', participants: [], status: 'Forslag' });
                } catch (err) {
                    alert("Kunne ikke lagre. Sjekk Firestore-reglene!");
                }
            };

            const toggleStatus = async (id, current) => {
                const next = current === 'Forslag' ? 'Påmeldt' : 'Forslag';
                await db.collection('events').doc(id).update({ status: next });
            };

            const remove = async (id) => {
                if (confirm("Vil du slette denne planen?")) {
                    await db.collection('events').doc(id).delete();
                }
            }

            const filtered = events.filter(e => filter === 'Alle' || e.type === filter);

            return (
                <div className="min-h-screen pb-20 bg-slate-50">
                    <header className="bg-slate-900 text-white p-6 sticky top-0 z-20 shadow-xl border-b border-slate-800">
                        <div className="max-w-md mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-yellow-400 p-2 rounded-xl shadow-lg shadow-yellow-400/20">
                                    <Icon name="trophy" className="w-5 h-5 text-slate-900" />
                                </div>
                                <h1 className="text-xl font-black italic uppercase tracking-tighter">Løpekalender</h1>
                            </div>
                            <button 
                                onClick={() => setShowModal(true)} 
                                className="bg-yellow-400 text-slate-900 px-5 py-2.5 rounded-full font-black text-xs active:scale-95 transition-all shadow-lg shadow-yellow-400/20 border-b-4 border-yellow-600"
                            >
                                + NYTT LØP
                            </button>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto p-4 space-y-4 mt-2">
                        <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                            {['Alle', 'Løp', 'Fellestrening'].map(t => (
                                <button 
                                    key={t} 
                                    onClick={() => setFilter(t)} 
                                    className={`px-5 py-2.5 rounded-full text-[10px] font-black uppercase border-2 transition-all whitespace-nowrap ${
                                        filter === t 
                                        ? 'bg-slate-900 text-white border-slate-900 shadow-md' 
                                        : 'bg-white text-slate-400 border-slate-200'
                                    }`}
                                >
                                    {t}
                                </button>
                            ))}
                        </div>

                        {loading ? (
                            <div className="py-24 text-center">
                                <div className="inline-block w-8 h-8 border-4 border-slate-200 border-t-yellow-400 rounded-full animate-spin mb-4"></div>
                                <p className="font-bold text-slate-300 uppercase text-[10px] tracking-widest">Henter data...</p>
                            </div>
                        ) : filtered.length === 0 ? (
                            <div className="py-20 text-center bg-white rounded-3xl border-2 border-dashed border-slate-200 px-10">
                                <Icon name="calendar" className="w-8 h-8 text-slate-200 mx-auto mb-3" />
                                <p className="text-slate-400 font-bold uppercase text-[10px] tracking-tight italic">Ingen aktiviteter funnet</p>
                            </div>
                        ) : (
                            <div className="space-y-3">
                                {filtered.map(e => (
                                    <div key={e.id} className="event-card bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm flex group transition-all hover:border-slate-300 active:scale-[0.98]">
                                        <div className={`w-16 flex flex-col items-center justify-center border-r transition-colors ${
                                            e.status === 'Påmeldt' ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-amber-50 text-amber-600 border-amber-100'
                                        }`}>
                                            <span className="text-[10px] font-black uppercase opacity-60">
                                                {new Date(e.date).toLocaleDateString('no-NO', {month:'short'})}
                                            </span>
                                            <span className="text-2xl font-black leading-none">
                                                {new Date(e.date).getDate() || '??'}
                                            </span>
                                        </div>

                                        <div className="flex-1 p-4 space-y-2 min-w-0">
                                            <div className="flex justify-between items-start">
                                                <h3 className="font-black text-slate-900 uppercase italic leading-none truncate pr-2 tracking-tight">
                                                    {e.title}
                                                </h3>
                                                <button onClick={() => remove(e.id)} className="text-slate-200 hover:text-red-500 transition-colors p-1">
                                                    <Icon name="trash-2" className="w-3.5 h-3.5"/>
                                                </button>
                                            </div>

                                            <div className="flex items-center gap-3 text-[9px] font-bold text-slate-400 uppercase">
                                                <div className="flex items-center gap-1 shrink-0">
                                                    <Icon name="map-pin" className="w-3 h-3 text-slate-300" /> 
                                                    <span className="truncate max-w-[80px]">{e.location || 'Oslo'}</span>
                                                </div>
                                                <span className={`px-2 py-0.5 rounded-full border shadow-sm ${
                                                    e.status === 'Påmeldt' 
                                                    ? 'bg-emerald-500 text-white border-emerald-400' 
                                                    : 'bg-white text-amber-600 border-amber-200'
                                                }`}>
                                                    {e.status}
                                                </span>
                                            </div>

                                            <div className="flex flex-wrap gap-1.5 pt-1">
                                                {RUNNERS.map(r => {
                                                    const isActive = e.participants?.includes(r.name);
                                                    return (
                                                        <div key={r.name} className={`flex items-center gap-1 px-2 py-1 rounded-lg text-[8px] font-black uppercase transition-all ${
                                                            isActive 
                                                            ? `${r.bg} ${r.text} shadow-sm ring-1 ring-inset ring-black/5` 
                                                            : 'bg-slate-50 text-slate-300 opacity-40'
                                                        }`}>
                                                            {r.name}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>

                                        <button 
                                            onClick={() => toggleStatus(e.id, e.status)} 
                                            className={`w-14 flex items-center justify-center transition-all ${
                                                e.status === 'Påmeldt' 
                                                ? 'bg-emerald-500 text-white active:bg-emerald-600' 
                                                : 'bg-slate-50 text-slate-200 hover:bg-slate-100'
                                            }`}
                                        >
                                            <Icon name={e.status === 'Påmeldt' ? "check-circle-2" : "circle"} className="w-6 h-6" />
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/80 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 backdrop-blur-md transition-all duration-300">
                            <div className="bg-white rounded-t-3xl sm:rounded-3xl w-full max-w-md p-6 shadow-2xl animate-in slide-in-from-bottom duration-300">
                                <div className="flex justify-between items-center mb-6">
                                    <div className="flex items-center gap-2">
                                        <div className="w-2 h-8 bg-yellow-400 rounded-full"></div>
                                        <h2 className="font-black uppercase italic text-xl tracking-tight text-slate-900">Planlegg Ny Aktivitet</h2>
                                    </div>
                                    <button onClick={() => setShowModal(false)} className="p-2 hover:bg-slate-100 rounded-full transition-colors text-slate-400">
                                        <Icon name="x" className="w-6 h-6"/>
                                    </button>
                                </div>

                                <form onSubmit={handleSubmit} className="space-y-5">
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-1">Navn på løpet</label>
                                        <input 
                                            required 
                                            placeholder="F.eks. Sentrumsløpet 10k" 
                                            className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none focus:border-yellow-400 focus:bg-white transition-all text-slate-900" 
                                            value={form.title} 
                                            onChange={x => setForm({...form, title: x.target.value})} 
                                        />
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-1">Dato</label>
                                            <input 
                                                required 
                                                type="date" 
                                                className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-sm outline-none focus:border-yellow-400 focus:bg-white transition-all" 
                                                value={form.date} 
                                                onChange={x => setForm({...form, date: x.target.value})} 
                                            />
                                        </div>
                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-1">Kategori</label>
                                            <select 
                                                className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-sm outline-none focus:border-yellow-400 focus:bg-white transition-all" 
                                                value={form.type} 
                                                onChange={x => setForm({...form, type: x.target.value})}
                                            >
                                                <option value="Løp">Løp</option>
                                                <option value="Fellestrening">Trening</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-1">Sted</label>
                                        <input 
                                            placeholder="Sted, by eller bane" 
                                            className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none focus:border-yellow-400 focus:bg-white transition-all" 
                                            value={form.location} 
                                            onChange={x => setForm({...form, location: x.target.value})} 
                                        />
                                    </div>

                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-1 italic">Hvem blir med?</label>
                                        <div className="grid grid-cols-2 gap-2">
                                            {RUNNERS.map(r => {
                                                const selected = form.participants.includes(r.name);
                                                return (
                                                    <button 
                                                        key={r.name} 
                                                        type="button" 
                                                        onClick={() => setForm({...form, participants: selected ? form.participants.filter(p => p !== r.name) : [...form.participants, r.name]})} 
                                                        className={`p-4 rounded-2xl text-[11px] font-black border-2 transition-all flex items-center justify-between ${
                                                            selected 
                                                            ? 'border-slate-900 bg-slate-900 text-white shadow-xl' 
                                                            : 'border-slate-100 bg-slate-50 text-slate-300 hover:border-slate-200'
                                                        }`}
                                                    >
                                                        {r.name}
                                                        {selected && <Icon name="check" className="w-3 h-3" />}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    <button 
                                        type="submit" 
                                        className="w-full p-5 bg-yellow-400 text-slate-900 font-black rounded-3xl uppercase tracking-widest shadow-xl shadow-yellow-400/30 active:scale-[0.97] transition-all mt-4 border-b-4 border-yellow-600"
                                    >
                                        Publiser løpet
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
