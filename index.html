<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Løpekalender 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .event-card { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAz9JaUKze476cCA_fC2YsQa3_TUzU7oJM",
            authDomain: "race-calendar-7f8ee.firebaseapp.com",
            projectId: "race-calendar-7f8ee",
            storageBucket: "race-calendar-7f8ee.firebasestorage.app",
            messagingSenderId: "349947217983",
            appId: "1:349947217983:web:45a84d0070e2ff34db908a"
        };

        const RUNNERS = [
            { name: 'Alexander', color: 'bg-blue-500', text: 'text-blue-700', bg: 'bg-blue-50' },
            { name: 'Didrik', color: 'bg-emerald-500', text: 'text-emerald-700', bg: 'bg-emerald-50' },
            { name: 'Erik', color: 'bg-purple-500', text: 'text-purple-700', bg: 'bg-purple-50' },
            { name: 'Espen', color: 'bg-orange-500', text: 'text-orange-700', bg: 'bg-orange-50' }
        ];

        // Inline SVG Ikoner for å unngå "removeChild" feil
        const icons = {
            trophy: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>,
            logout: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>,
            trash: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
            mapPin: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>,
            checkCircle: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            circle: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/></svg>,
            calendar: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>,
            x: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>,
            check: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        };

        const Icon = ({ name, className }) => {
            const icon = icons[name] || null;
            return icon ? React.cloneElement(icon, { className }) : null;
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [loginInput, setLoginInput] = useState('');
            const [loginError, setLoginError] = useState(false);
            const [events, setEvents] = useState([]);
            const [showModal, setShowModal] = useState(false);
            const [loading, setLoading] = useState(true);
            const [filter, setFilter] = useState('Alle');
            
            const [form, setForm] = useState({
                title: '', date: '', type: 'Løp', location: '', participants: [], status: 'Forslag'
            });

            useEffect(() => {
                const savedUser = localStorage.getItem('running_app_user');
                if (savedUser) {
                    const runner = RUNNERS.find(r => r.name.toLowerCase() === savedUser.toLowerCase());
                    if (runner) setCurrentUser(runner.name);
                }

                auth.signInAnonymously().catch(() => {});

                const unsubscribe = db.collection('events')
                    .onSnapshot((snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        const sorted = data.sort((a, b) => new Date(a.date) - new Date(b.date));
                        setEvents(sorted);
                        setLoading(false);
                    }, (err) => {
                        setLoading(false);
                    });

                return () => unsubscribe();
            }, []);

            const handleLogin = (e) => {
                e.preventDefault();
                const runner = RUNNERS.find(r => r.name.toLowerCase() === loginInput.trim().toLowerCase());
                if (runner) {
                    setCurrentUser(runner.name);
                    localStorage.setItem('running_app_user', runner.name);
                    setLoginError(false);
                } else {
                    setLoginError(true);
                }
            };

            const logout = () => {
                setCurrentUser(null);
                localStorage.removeItem('running_app_user');
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                try {
                    await db.collection('events').add({
                        ...form,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setShowModal(false);
                    setForm({ title: '', date: '', type: 'Løp', location: '', participants: [], status: 'Forslag' });
                } catch (err) {
                    console.error(err);
                }
            };

            const toggleParticipation = async (id, participants = []) => {
                if (!currentUser) return;
                let newParticipants = participants.includes(currentUser)
                    ? participants.filter(p => p !== currentUser)
                    : [...participants, currentUser];

                const newStatus = newParticipants.length > 0 ? 'Påmeldt' : 'Forslag';
                await db.collection('events').doc(id).update({ 
                    participants: newParticipants,
                    status: newStatus
                });
            };

            const remove = async (id) => {
                if (confirm("Vil du slette denne planen?")) {
                    await db.collection('events').doc(id).delete();
                }
            }

            if (!currentUser) {
                return (
                    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6">
                        <div className="w-full max-w-sm space-y-8 text-center">
                            <div className="space-y-2">
                                <div className="bg-yellow-400 w-16 h-16 rounded-2xl mx-auto flex items-center justify-center shadow-2xl shadow-yellow-400/20 rotate-3">
                                    <Icon name="trophy" className="w-8 h-8 text-slate-900" />
                                </div>
                                <h1 className="text-white text-3xl font-black italic uppercase tracking-tighter pt-4">Løpekalender</h1>
                                <p className="text-slate-400 text-xs font-bold uppercase tracking-widest">Skriv navnet ditt</p>
                            </div>

                            <form onSubmit={handleLogin} className="space-y-4">
                                <input 
                                    autoFocus
                                    type="text" 
                                    placeholder="Navn" 
                                    className={`w-full p-5 bg-slate-800 border-2 rounded-3xl font-bold text-white outline-none transition-all text-center ${loginError ? 'border-red-500' : 'border-slate-700 focus:border-yellow-400'}`}
                                    value={loginInput}
                                    onChange={(e) => setLoginInput(e.target.value)}
                                />
                                {loginError && <p className="text-red-500 text-[10px] font-black uppercase">Navnet ble ikke gjenkjent</p>}
                                <button className="w-full p-5 bg-yellow-400 text-slate-900 font-black rounded-3xl uppercase tracking-widest shadow-xl shadow-yellow-400/20 active:scale-95 transition-all border-b-4 border-yellow-600">
                                    Logg inn
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-20 bg-slate-50">
                    <header className="bg-slate-900 text-white p-6 sticky top-0 z-20 shadow-xl border-b border-slate-800">
                        <div className="max-w-md mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <button onClick={logout} className="bg-slate-800 p-2 rounded-xl border border-slate-700">
                                    <Icon name="logout" className="w-4 h-4 text-slate-400" />
                                </button>
                                <div className="flex flex-col">
                                    <h1 className="text-sm font-black italic uppercase tracking-tighter leading-none">Løpekalender</h1>
                                    <span className="text-[10px] font-bold text-yellow-400 uppercase tracking-widest">{currentUser}</span>
                                </div>
                            </div>
                            <button 
                                onClick={() => setShowModal(true)} 
                                className="bg-yellow-400 text-slate-900 px-5 py-2.5 rounded-full font-black text-xs active:scale-95 transition-all shadow-lg shadow-yellow-400/20 border-b-4 border-yellow-600"
                            >
                                + NYTT LØP
                            </button>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto p-4 space-y-4 mt-2">
                        <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                            {['Alle', 'Løp', 'Fellestrening'].map(t => (
                                <button 
                                    key={t} 
                                    onClick={() => setFilter(t)} 
                                    className={`px-5 py-2.5 rounded-full text-[10px] font-black uppercase border-2 transition-all whitespace-nowrap ${
                                        filter === t 
                                        ? 'bg-slate-900 text-white border-slate-900 shadow-md' 
                                        : 'bg-white text-slate-400 border-slate-200'
                                    }`}
                                >
                                    {t}
                                </button>
                            ))}
                        </div>

                        {loading ? (
                            <div className="py-24 text-center">
                                <div className="inline-block w-8 h-8 border-4 border-slate-200 border-t-yellow-400 rounded-full animate-spin"></div>
                            </div>
                        ) : (
                            <div className="space-y-3">
                                {events.filter(e => filter === 'Alle' || e.type === filter).map(e => (
                                    <div key={e.id} className="event-card bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm flex transition-all active:scale-[0.98]">
                                        <div className={`w-16 flex flex-col items-center justify-center border-r transition-colors ${
                                            e.status === 'Påmeldt' ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-amber-50 text-amber-600 border-amber-100'
                                        }`}>
                                            <span className="text-[10px] font-black uppercase opacity-60">
                                                {new Date(e.date).toLocaleDateString('no-NO', {month:'short'})}
                                            </span>
                                            <span className="text-2xl font-black">
                                                {new Date(e.date).getDate()}
                                            </span>
                                        </div>

                                        <div className="flex-1 p-4 space-y-2 min-w-0">
                                            <div className="flex justify-between items-start">
                                                <h3 className="font-black text-slate-900 uppercase italic truncate pr-2 tracking-tight">
                                                    {e.title}
                                                </h3>
                                                <button onClick={() => remove(e.id)} className="text-slate-200 hover:text-red-500 transition-colors p-1">
                                                    <Icon name="trash" className="w-3.5 h-3.5"/>
                                                </button>
                                            </div>

                                            <div className="flex items-center gap-3 text-[9px] font-bold text-slate-400 uppercase">
                                                <div className="flex items-center gap-1 shrink-0">
                                                    <Icon name="mapPin" className="w-3 h-3 text-slate-300" /> 
                                                    <span>{e.location || 'Oslo'}</span>
                                                </div>
                                                <span className={`px-2 py-0.5 rounded-full border ${
                                                    e.status === 'Påmeldt' ? 'bg-emerald-500 text-white border-emerald-400' : 'bg-white text-amber-600 border-amber-200'
                                                }`}>
                                                    {e.status}
                                                </span>
                                            </div>

                                            <div className="flex flex-wrap gap-1.5 pt-1">
                                                {RUNNERS.map(r => (
                                                    <div key={r.name} className={`px-2 py-1 rounded-lg text-[8px] font-black uppercase transition-all ${
                                                        e.participants?.includes(r.name) 
                                                        ? `${r.bg} ${r.text} shadow-sm ring-1 ring-black/5` 
                                                        : 'bg-slate-50 text-slate-300 opacity-40'
                                                    }`}>
                                                        {r.name}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <button 
                                            onClick={() => toggleParticipation(e.id, e.participants)} 
                                            className={`w-14 flex items-center justify-center transition-all ${
                                                e.participants?.includes(currentUser) ? 'bg-emerald-500 text-white' : 'bg-slate-50 text-slate-200'
                                            }`}
                                        >
                                            <Icon name={e.participants?.includes(currentUser) ? "checkCircle" : "circle"} className="w-6 h-6" />
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/80 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 backdrop-blur-md">
                            <div className="bg-white rounded-t-3xl sm:rounded-3xl w-full max-w-md p-6 shadow-2xl">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="font-black uppercase italic text-xl text-slate-900 tracking-tight">Ny Aktivitet</h2>
                                    <button onClick={() => setShowModal(false)} className="p-2 text-slate-400">
                                        <Icon name="x" className="w-6 h-6"/>
                                    </button>
                                </div>

                                <form onSubmit={handleSubmit} className="space-y-4">
                                    <input 
                                        required placeholder="Løpets navn" 
                                        className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none focus:border-yellow-400 transition-all" 
                                        value={form.title} onChange={x => setForm({...form, title: x.target.value})} 
                                    />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input 
                                            required type="date" 
                                            className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none focus:border-yellow-400 transition-all" 
                                            value={form.date} onChange={x => setForm({...form, date: x.target.value})} 
                                        />
                                        <select 
                                            className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none focus:border-yellow-400 transition-all" 
                                            value={form.type} onChange={x => setForm({...form, type: x.target.value})}
                                        >
                                            <option value="Løp">Løp</option>
                                            <option value="Fellestrening">Trening</option>
                                        </select>
                                    </div>
                                    <input 
                                        placeholder="Sted" 
                                        className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none focus:border-yellow-400 transition-all" 
                                        value={form.location} onChange={x => setForm({...form, location: x.target.value})} 
                                    />
                                    <button type="submit" className="w-full p-5 bg-yellow-400 text-slate-900 font-black rounded-3xl uppercase tracking-widest shadow-xl shadow-yellow-400/30 border-b-4 border-yellow-600 active:scale-95 transition-all">
                                        Publiser
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
