<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Løpekalender 2026</title>
    
    <!-- Styling & Ikoner -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- DIN KONFIGURASJON ---
        const firebaseConfig = {
            apiKey: "AIzaSyAz9JaUKze476cCA_fC2YsQa3_TUzU7oJM",
            authDomain: "race-calendar-7f8ee.firebaseapp.com",
            projectId: "race-calendar-7f8ee",
            storageBucket: "race-calendar-7f8ee.firebasestorage.app",
            messagingSenderId: "349947217983",
            appId: "1:349947217983:web:45a84d0070e2ff34db908a"
        };

        const RUNNERS = [
            { name: 'Alexander', color: 'bg-blue-500', text: 'text-blue-700', bg: 'bg-blue-50' },
            { name: 'Didrik', color: 'bg-emerald-500', text: 'text-emerald-700', bg: 'bg-emerald-50' },
            { name: 'Erik', color: 'bg-purple-500', text: 'text-purple-700', bg: 'bg-purple-50' },
            { name: 'Espen', color: 'bg-orange-500', text: 'text-orange-700', bg: 'bg-orange-50' }
        ];

        // Initialiser Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        // Ikon-hjelper
        const Icon = ({ name, className }) => {
            useEffect(() => { 
                if (window.lucide) lucide.createIcons(); 
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const [events, setEvents] = useState([]);
            const [showModal, setShowModal] = useState(false);
            const [loading, setLoading] = useState(true);
            const [filter, setFilter] = useState('Alle');
            
            const [form, setForm] = useState({
                title: '', date: '', type: 'Løp', location: '', participants: [], status: 'Forslag'
            });

            useEffect(() => {
                // Forsøk anonym pålogging, men fortsett uansett (Firestore fungerer hvis Rules er 'if true')
                auth.signInAnonymously()
                    .then(() => console.log("Anonymt innlogget"))
                    .catch(err => {
                        console.warn("Auth info: Anonym pålogging er ikke aktivert i Firebase, men vi prøver å laste data uansett.");
                    });

                // Lytt til endringer i databasen
                const unsubscribe = db.collection('events')
                    .onSnapshot((snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        const sorted = data.sort((a, b) => new Date(a.date) - new Date(b.date));
                        setEvents(sorted);
                        setLoading(false);
                        if (window.lucide) lucide.createIcons();
                    }, (err) => {
                        console.error("Database feil:", err);
                        setLoading(false);
                    });
                return () => unsubscribe();
            }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                try {
                    await db.collection('events').add(form);
                    setShowModal(false);
                    setForm({ title: '', date: '', type: 'Løp', location: '', participants: [], status: 'Forslag' });
                } catch (err) {
                    console.error("Lagringsfeil:", err);
                    alert("Kunne ikke lagre. Husk å sette Firestore Rules til 'allow read, write: if true;'");
                }
            };

            const toggleStatus = async (id, current) => {
                const next = current === 'Forslag' ? 'Påmeldt' : 'Forslag';
                try {
                    await db.collection('events').doc(id).update({ status: next });
                } catch (err) {
                    console.error("Oppdateringsfeil:", err);
                }
            };

            const remove = async (id) => {
                if (confirm("Slette denne planen?")) {
                    try {
                        await db.collection('events').doc(id).delete();
                    } catch (err) {
                        console.error("Slettefeil:", err);
                    }
                }
            };

            const filtered = events.filter(e => filter === 'Alle' || e.type === filter);

            return (
                <div className="min-h-screen pb-12">
                    <header className="bg-slate-900 text-white p-6 sticky top-0 z-20 shadow-xl border-b border-slate-800">
                        <div className="max-w-md mx-auto flex justify-between items-center">
                            <h1 className="text-xl font-black italic uppercase tracking-tighter flex items-center gap-2">
                                <Icon name="trophy" className="w-5 h-5 text-yellow-400" /> Løpekalender
                            </h1>
                            <button onClick={() => setShowModal(true)} className="bg-yellow-400 text-slate-900 px-4 py-2 rounded-full font-black text-xs active:scale-95 transition-transform shadow-lg shadow-yellow-400/20">
                                + NYTT LØP
                            </button>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto p-4 space-y-4">
                        <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                            {['Alle', 'Løp', 'Fellestrening'].map(t => (
                                <button key={t} onClick={() => setFilter(t)} className={`px-5 py-2 rounded-full text-[10px] font-black uppercase border-2 transition-all whitespace-nowrap ${filter === t ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-400 border-slate-100'}`}>
                                    {t}
                                </button>
                            ))}
                        </div>

                        {loading ? (
                            <div className="py-20 text-center animate-pulse font-bold text-slate-300 uppercase text-xs tracking-widest">Henter data fra skyen...</div>
                        ) : filtered.length === 0 ? (
                            <div className="py-20 text-center bg-white rounded-3xl border-2 border-dashed border-slate-200">
                                <p className="text-slate-400 font-bold uppercase text-[10px] tracking-tight italic">Ingen aktiviteter funnet</p>
                            </div>
                        ) : filtered.map(e => (
                            <div key={e.id} className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm flex group transition-all hover:border-slate-300">
                                <div className={`w-16 flex flex-col items-center justify-center border-r transition-colors ${e.status === 'Påmeldt' ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-amber-50 text-amber-600 border-amber-100'}`}>
                                    <span className="text-[10px] font-black uppercase">{new Date(e.date).toLocaleDateString('no-NO', {month:'short'})}</span>
                                    <span className="text-xl font-black">{new Date(e.date).getDate() || '??'}</span>
                                </div>
                                <div className="flex-1 p-4 space-y-2">
                                    <div className="flex justify-between items-start">
                                        <h3 className="font-black text-slate-900 uppercase italic leading-none truncate pr-2">{e.title}</h3>
                                        <button onClick={() => remove(e.id)} className="text-slate-200 hover:text-red-500 transition-colors"><Icon name="trash-2" className="w-3 h-3"/></button>
                                    </div>
                                    <div className="flex items-center gap-2 text-[9px] font-bold text-slate-400 uppercase">
                                        <div className="flex items-center gap-1"><Icon name="map-pin" className="w-2.5 h-2.5" /> {e.location || 'Oslo'}</div>
                                        <span className={`px-1.5 py-0.5 rounded-full ${e.status === 'Påmeldt' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}`}>{e.status}</span>
                                    </div>
                                    <div className="flex flex-wrap gap-1 pt-1">
                                        {RUNNERS.map(r => (
                                            <span key={r.name} className={`px-2 py-0.5 rounded-full text-[8px] font-black uppercase transition-all ${e.participants?.includes(r.name) ? `${r.bg} ${r.text}` : 'bg-slate-50 text-slate-200 opacity-50'}`}>{r.name}</span>
                                        ))}
                                    </div>
                                </div>
                                <button onClick={() => toggleStatus(e.id, e.status)} className={`w-12 flex items-center justify-center transition-all ${e.status === 'Påmeldt' ? 'bg-emerald-500 text-white' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                    <Icon name="check" className="w-6 h-6" />
                                </button>
                            </div>
                        ))}
                    </main>

                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/90 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-t-3xl sm:rounded-3xl w-full max-w-md p-6 shadow-2xl">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="font-black uppercase italic text-xl">Ny aktivitet</h2>
                                    <button onClick={() => setShowModal(false)} className="p-2 hover:bg-slate-100 rounded-full transition-colors"><Icon name="x" className="w-6 h-6"/></button>
                                </div>
                                <form onSubmit={handleSubmit} className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Hva skjer?</label>
                                        <input required placeholder="Eks: Oslo Maraton" className="w-full p-4 bg-slate-100 rounded-xl font-bold outline-none focus:ring-2 ring-yellow-400 transition-all" value={form.title} onChange={x => setForm({...form, title: x.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Dato</label>
                                            <input required type="date" className="w-full p-4 bg-slate-100 rounded-xl font-bold text-sm outline-none focus:ring-2 ring-yellow-400" value={form.date} onChange={x => setForm({...form, date: x.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Type</label>
                                            <select className="w-full p-4 bg-slate-100 rounded-xl font-bold text-sm outline-none focus:ring-2 ring-yellow-400" value={form.type} onChange={x => setForm({...form, type: x.target.value})}>
                                                <option value="Løp">Løp</option>
                                                <option value="Fellestrening">Trening</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Hvor?</label>
                                        <input placeholder="Eks: Bislett / Gøteborg" className="w-full p-4 bg-slate-100 rounded-xl font-bold outline-none focus:ring-2 ring-yellow-400" value={form.location} onChange={x => setForm({...form, location: x.target.value})} />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Hvem skal være med?</label>
                                        <div className="grid grid-cols-2 gap-2">
                                            {RUNNERS.map(r => (
                                                <button key={r.name} type="button" onClick={() => setForm({...form, participants: form.participants.includes(r.name) ? form.participants.filter(p => p !== r.name) : [...form.participants, r.name]})} className={`p-3 rounded-xl text-[10px] font-black border-2 transition-all ${form.participants.includes(r.name) ? 'border-slate-900 bg-slate-900 text-white shadow-lg shadow-slate-900/20' : 'border-slate-100 text-slate-300 hover:border-slate-200'}`}>
                                                    {r.name}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full p-5 bg-yellow-400 text-slate-900 font-black rounded-2xl uppercase tracking-widest shadow-lg shadow-yellow-400/30 active:scale-95 transition-transform mt-4">Lagre i skyen</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
