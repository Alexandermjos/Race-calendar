<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Løpekalender 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const RUNNERS = [
            { name: 'Alexander', color: 'bg-blue-500', text: 'text-blue-700', bg: 'bg-blue-50' },
            { name: 'Didrik', color: 'bg-emerald-500', text: 'text-emerald-700', bg: 'bg-emerald-50' },
            { name: 'Erik', color: 'bg-purple-500', text: 'text-purple-700', bg: 'bg-purple-50' },
            { name: 'Espen', color: 'bg-orange-500', text: 'text-orange-700', bg: 'bg-orange-50' }
        ];

        const EVENT_TYPES = ['Løp', 'Fellestrening'];

        // Ikon-komponent som fungerer med Lucide i nettleseren
        const Icon = ({ name, className }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const [events, setEvents] = useState([]);
            const [showModal, setShowModal] = useState(false);
            const [filter, setFilter] = useState('Alle');
            
            const [formData, setFormData] = useState({
                title: '',
                date: '',
                type: 'Løp',
                location: '',
                participants: [],
                status: 'Forslag'
            });

            // Hent data fra minnet på telefonen/PCen
            useEffect(() => {
                const saved = localStorage.getItem('race_cal_v1');
                if (saved) setEvents(JSON.parse(saved));
            }, []);

            // Lagre hver gang noe endres
            useEffect(() => {
                localStorage.setItem('race_cal_v1', JSON.stringify(events));
                lucide.createIcons();
            }, [events]);

            const handleAddEvent = (e) => {
                e.preventDefault();
                const newEvent = { ...formData, id: Date.now() };
                setEvents([...events, newEvent].sort((a, b) => new Date(a.date) - new Date(b.date)));
                setShowModal(false);
                setFormData({ title: '', date: '', type: 'Løp', location: '', participants: [], status: 'Forslag' });
            };

            const toggleParticipant = (name) => {
                setFormData(prev => ({
                    ...prev,
                    participants: prev.participants.includes(name)
                        ? prev.participants.filter(p => p !== name)
                        : [...prev.participants, name]
                }));
            };

            const toggleStatus = (id) => {
                setEvents(events.map(e => e.id === id ? { ...e, status: e.status === 'Forslag' ? 'Påmeldt' : 'Forslag' } : e));
            };

            const deleteEvent = (id) => {
                if(confirm("Slette denne planen?")) setEvents(events.filter(e => e.id !== id));
            };

            const filteredEvents = events.filter(e => filter === 'Alle' || e.type === filter);

            return (
                <div className="min-h-screen pb-10">
                    <header className="bg-slate-900 text-white p-6 sticky top-0 z-20 shadow-lg">
                        <div className="max-w-xl mx-auto flex justify-between items-center">
                            <h1 className="text-xl font-black italic uppercase tracking-tight flex items-center gap-2">
                                <Icon name="zap" className="w-5 h-5 text-yellow-400 fill-current" />
                                Løpekalender
                            </h1>
                            <button onClick={() => setShowModal(true)} className="bg-yellow-400 text-slate-900 px-4 py-2 rounded-full font-black text-xs hover:scale-105 transition-transform">
                                + NYTT LØP
                            </button>
                        </div>
                    </header>

                    <main className="max-w-xl mx-auto p-4 space-y-4">
                        <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                            {['Alle', ...EVENT_TYPES].map(t => (
                                <button key={t} onClick={() => setFilter(t)} className={`px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest border-2 transition-all ${filter === t ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-400 border-slate-200'}`}>
                                    {t}
                                </button>
                            ))}
                        </div>

                        {filteredEvents.length === 0 ? (
                            <div className="text-center py-20 text-slate-300 font-bold uppercase text-xs tracking-widest">Ingen løp planlagt</div>
                        ) : (
                            filteredEvents.map(event => (
                                <div key={event.id} className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm flex">
                                    <div className={`w-20 flex flex-col items-center justify-center border-r border-slate-50 ${event.status === 'Påmeldt' ? 'bg-emerald-50' : 'bg-amber-50'}`}>
                                        <span className="text-[10px] font-black text-slate-400 uppercase">{new Date(event.date).toLocaleDateString('no-NO', { month: 'short' })}</span>
                                        <span className="text-2xl font-black text-slate-900 leading-none">{new Date(event.date).getDate()}</span>
                                    </div>
                                    <div className="flex-1 p-4 space-y-2">
                                        <div className="flex justify-between items-start">
                                            <h3 className="font-black text-slate-900 uppercase italic leading-tight">{event.title}</h3>
                                            <button onClick={() => deleteEvent(event.id)} className="text-slate-200 hover:text-red-500"><Icon name="trash-2" className="w-4 h-4" /></button>
                                        </div>
                                        <div className="flex items-center gap-3 text-[10px] font-bold text-slate-400 uppercase tracking-tighter">
                                            <span className="flex items-center gap-1"><Icon name="map-pin" className="w-3 h-3" /> {event.location || 'Oslo'}</span>
                                            <span className={`px-2 py-0.5 rounded ${event.status === 'Påmeldt' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}`}>{event.status}</span>
                                        </div>
                                        <div className="flex flex-wrap gap-1 mt-2">
                                            {RUNNERS.map(r => (
                                                <div key={r.name} className={`px-2 py-1 rounded text-[9px] font-black uppercase ${event.participants.includes(r.name) ? `${r.bg} ${r.text}` : 'bg-slate-50 text-slate-200'}`}>
                                                    {r.name}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={() => toggleStatus(event.id)} className={`w-12 flex items-center justify-center transition-colors ${event.status === 'Påmeldt' ? 'bg-emerald-500 text-white' : 'bg-slate-50 text-slate-300'}`}>
                                        <Icon name="check" className="w-6 h-6" />
                                    </button>
                                </div>
                            ))
                        )}
                    </main>

                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/90 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-t-3xl sm:rounded-3xl w-full max-w-md overflow-hidden animate-in slide-in-from-bottom duration-300">
                                <div className="p-6 bg-slate-900 text-white flex justify-between items-center">
                                    <h2 className="font-black uppercase italic tracking-wider">Ny aktivitet</h2>
                                    <button onClick={() => setShowModal(false)} className="p-2 hover:bg-white/10 rounded-full"><Icon name="x" className="w-6 h-6" /></button>
                                </div>
                                <form onSubmit={handleAddEvent} className="p-6 space-y-5
